<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Student Registration</h1>

        <form id="studentForm">

            <input type="text" id="name" placeholder="Enter Name" required>

            <input type="text" id="rollNumber" placeholder="Enter Roll Number" required>

            <input type="text" id="department" placeholder="Enter Department" required>

            <button type="submit">Register</button>

        </form>

        <p id="message"></p>

    </div>

    <h2>Registered Students</h2>

    <ul id="studentList"></ul>

    <h2>Face Registration</h2>

    <div class="video-container">

        <video id="video" width="320" height="240" autoplay></video>

    </div>
    <h3 id="recognitionResult">
    Waiting For Recognition...
    </h3>

    <br>

    <button id="captureBtn">Capture Face</button>
    <input
    type="text"
    id="faceRollNumber"
    placeholder="Enter Roll Number For Face Registration"
    >   


    <button id="registerFaceBtn">
    Register Face
    </button>

    <br><br>

    <canvas id="canvas" width="320" height="240"></canvas>
    <br><br>

    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
